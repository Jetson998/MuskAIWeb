services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG:-main}
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      WEBUI_AUTH: "${WEBUI_AUTH:-true}"
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY:-change-me-before-production}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      OPENAI_API_BASE_URL: "${OPENAI_API_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ENABLE_IMAGE_GENERATION: "${ENABLE_IMAGE_GENERATION:-true}"
      IMAGE_GENERATION_ENGINE: "${IMAGE_GENERATION_ENGINE:-openai}"
      IMAGE_GENERATION_MODEL: "${IMAGE_GENERATION_MODEL:-gpt-image-2}"
      IMAGE_SIZE: "${IMAGE_SIZE:-1024x1024}"
      ENABLE_IMAGE_PROMPT_GENERATION: "${ENABLE_IMAGE_PROMPT_GENERATION:-false}"
      ENABLE_IMAGE_EDIT: "${ENABLE_IMAGE_EDIT:-true}"
      IMAGE_EDIT_ENGINE: "${IMAGE_EDIT_ENGINE:-openai}"
      IMAGE_EDIT_MODEL: "${IMAGE_EDIT_MODEL:-gpt-image-2}"
      IMAGE_EDIT_SIZE: "${IMAGE_EDIT_SIZE:-1024x1024}"
      IMAGES_OPENAI_API_BASE_URL: "${IMAGES_OPENAI_API_BASE_URL:-${OPENAI_API_BASE_URL:-https://api.openai.com/v1}}"
      IMAGES_OPENAI_API_KEY: "${IMAGES_OPENAI_API_KEY:-${OPENAI_API_KEY:-}}"
      IMAGES_EDIT_OPENAI_API_BASE_URL: "${IMAGES_EDIT_OPENAI_API_BASE_URL:-${IMAGES_OPENAI_API_BASE_URL:-${OPENAI_API_BASE_URL:-https://api.openai.com/v1}}}"
      IMAGES_EDIT_OPENAI_API_KEY: "${IMAGES_EDIT_OPENAI_API_KEY:-${IMAGES_OPENAI_API_KEY:-${OPENAI_API_KEY:-}}}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui:/app/backend/data

volumes:
  open-webui:
